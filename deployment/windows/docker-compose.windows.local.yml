# ============================================================================
# OpenNotebook Archival — Despliegue Windows Local Endurecido
# ============================================================================
# Archivo utilizado por los scripts de deployment/windows/.
# Lee la configuración de deployment/windows/runtime/settings.env
# (generado automáticamente por 00-PRIMERA-INSTALACION.bat).
#
# Principios de seguridad aplicados:
#   1. SurrealDB NO publica puertos al host (solo red interna Docker)
#   2. Frontend y API solo escuchan en 127.0.0.1
#   3. Credenciales generadas automáticamente (no triviales)
#   4. Imagen fijada a versión concreta (sin pull automático)
#   5. Contenedores sin privilegios elevados
#   6. Red interna aislada para comunicación entre servicios
#   7. Sin llamadas de actualización automática al exterior
#   8. Volúmenes nombrados (más seguros que bind mounts en Windows)
#   9. Restricciones de seguridad del kernel (no-new-privileges)
#  10. Límites de recursos para prevenir denegación de servicio local
# ============================================================================

services:

  # --------------------------------------------------------------------------
  # BASE DE DATOS — SurrealDB
  # --------------------------------------------------------------------------
  # NUNCA expuesta al host. Solo accesible desde open_notebook via red interna.
  # --------------------------------------------------------------------------
  surrealdb:
    image: surrealdb/surrealdb:v2.1.4
    container_name: on-surrealdb

    command: >-
      start
      --log warn
      --user ${SURREAL_ROOT_USER}
      --pass ${SURREAL_ROOT_PASSWORD}
      --bind 0.0.0.0:8000
      rocksdb:/mydata/mydatabase.db

    # --- SIN PUERTOS PUBLICADOS ---
    # SurrealDB solo es alcanzable como surrealdb:8000 dentro de la red
    # Docker "on_internal". Ningún proceso del host puede conectarse.

    volumes:
      - surreal_data:/mydata

    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=false

    restart: unless-stopped
    pull_policy: never

    networks:
      - on_internal

    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M

    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # --------------------------------------------------------------------------
  # APLICACIÓN — Open Notebook
  # --------------------------------------------------------------------------
  # Frontend y API solo en 127.0.0.1.
  # --------------------------------------------------------------------------
  open_notebook:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: opennotebook-archival:local
    container_name: on-app

    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8502}:8502"
      - "127.0.0.1:${API_PORT:-5055}:5055"

    environment:
      # Conexión a BD via red interna Docker (NO via host)
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_USER=${SURREAL_ROOT_USER}
      - SURREAL_PASSWORD=${SURREAL_ROOT_PASSWORD}
      - SURREAL_NAMESPACE=${SURREAL_NAMESPACE}
      - SURREAL_DATABASE=${SURREAL_DATABASE}

      # Autenticación y cifrado
      - OPEN_NOTEBOOK_PASSWORD=${OPEN_NOTEBOOK_PASSWORD}
      - OPEN_NOTEBOOK_ENCRYPTION_KEY=${OPEN_NOTEBOOK_ENCRYPTION_KEY}

      # Conexión a Ollama (URL ya convertida a host.docker.internal por el instalador)
      - OLLAMA_API_BASE=${OLLAMA_API_BASE}

      # Endpoint compatible con OpenAI (opcional)
      - OPENAI_COMPATIBLE_BASE_URL=${OPENAI_COMPATIBLE_BASE_URL:-}
      - OPENAI_COMPATIBLE_API_KEY=${OPENAI_COMPATIBLE_API_KEY:-}

      # Seguridad y configuración de la aplicación
      - OPEN_NOTEBOOK_ALLOWED_ORIGINS=${OPEN_NOTEBOOK_ALLOWED_ORIGINS}
      - OPEN_NOTEBOOK_PUBLIC_DOCS=${OPEN_NOTEBOOK_PUBLIC_DOCS:-false}
      - OPEN_NOTEBOOK_ENABLE_UPDATE_CHECK=${OPEN_NOTEBOOK_ENABLE_UPDATE_CHECK:-false}
      - OPEN_NOTEBOOK_TRUST_PROXY_HEADERS=${OPEN_NOTEBOOK_TRUST_PROXY_HEADERS:-false}
      - OPEN_NOTEBOOK_AUTH_MAX_ATTEMPTS=${OPEN_NOTEBOOK_AUTH_MAX_ATTEMPTS:-10}
      - OPEN_NOTEBOOK_AUTH_WINDOW_SECONDS=${OPEN_NOTEBOOK_AUTH_WINDOW_SECONDS:-300}
      - OPEN_NOTEBOOK_AUTH_BLOCK_SECONDS=${OPEN_NOTEBOOK_AUTH_BLOCK_SECONDS:-600}
      - OPEN_NOTEBOOK_AUTH_FAILURE_DELAY_MS=${OPEN_NOTEBOOK_AUTH_FAILURE_DELAY_MS:-400}
      - OPEN_NOTEBOOK_MAX_UPLOAD_BYTES=${OPEN_NOTEBOOK_MAX_UPLOAD_BYTES:-52428800}
      - OPEN_NOTEBOOK_ALLOW_PRIVATE_SOURCE_URLS=${OPEN_NOTEBOOK_ALLOW_PRIVATE_SOURCE_URLS:-false}

    volumes:
      - notebook_data:/app/data

    depends_on:
      surrealdb:
        condition: service_healthy

    restart: unless-stopped
    pull_policy: never

    networks:
      - on_internal

    security_opt:
      - no-new-privileges:true

    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M

# ============================================================================
# RED INTERNA
# ============================================================================
networks:
  on_internal:
    driver: bridge
    internal: false
    # internal: false permite a open_notebook alcanzar Ollama en
    # host.docker.internal y descargar contenido web para procesar.

# ============================================================================
# VOLÚMENES NOMBRADOS
# ============================================================================
volumes:
  surreal_data:
    name: on-surreal-data
  notebook_data:
    name: on-notebook-data
