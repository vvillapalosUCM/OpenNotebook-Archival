# ============================================================================
# OpenNotebook — Despliegue Local Endurecido
# ============================================================================
# Diseñado para uso exclusivamente local (127.0.0.1) en equipos Windows
# con Docker Desktop. Optimizado para el sector GLAM / archivístico.
#
# Principios de seguridad aplicados:
#   1. SurrealDB NO publica puertos al host (solo red interna Docker)
#   2. Frontend y API solo escuchan en localhost (127.0.0.1)
#   3. Credenciales de BD no triviales (definidas en .env)
#   4. Imágenes fijadas a versión concreta (sin pull automático)
#   5. Contenedores sin privilegios elevados
#   6. Red interna aislada para comunicación entre servicios
#   7. Sin llamadas de actualización automática al exterior
#   8. Volúmenes nombrados (más seguros que bind mounts en Windows)
#   9. Restricciones de seguridad del kernel (no-new-privileges)
#  10. Límites de recursos para prevenir denegación de servicio local
#
# USO:
#   1. Copiar .env.hardened a .env y personalizar las contraseñas
#   2. docker compose up -d
#   3. Abrir http://127.0.0.1:8502
#
# IMPORTANTE: Verificar que se usa v1.8.3 o superior (parche CVE inyección
# SurrealQL reportado por CERT-EU). Ver SECURITY_NOTES.md para detalles.
# ============================================================================

services:

  # --------------------------------------------------------------------------
  # BASE DE DATOS — SurrealDB
  # --------------------------------------------------------------------------
  # NUNCA expuesta al host. Solo accesible desde open_notebook via red interna.
  # --------------------------------------------------------------------------
  surrealdb:
    image: surrealdb/surrealdb:v2.1.4
    container_name: on-surrealdb

    command: >-
      start
      --log warn
      --user ${SURREAL_USER}
      --pass ${SURREAL_PASSWORD}
      --bind 0.0.0.0:8000
      rocksdb:/mydata/mydatabase.db

    # --- SIN PUERTOS PUBLICADOS ---
    # SurrealDB solo es alcanzable como surrealdb:8000 dentro de la red
    # Docker "on_internal". Ningún proceso del host puede conectarse.

    volumes:
      - surreal_data:/mydata

    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=false

    restart: unless-stopped
    pull_policy: never

    networks:
      - on_internal

    # Seguridad del contenedor
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M

    # Límites de recursos
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M

    # Health check interno (no requiere puerto publicado)
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      # Nota: SurrealDB no ofrece un endpoint /health sencillo en CLI.
      # Este healthcheck básico verifica que el proceso está vivo.
      # Para un check más robusto, se puede usar:
      #   test: ["CMD", "surreal", "sql", "--conn", "ws://localhost:8000",
      #          "--user", "$$SURREAL_USER", "--pass", "$$SURREAL_PASSWORD",
      #          "--ns", "test", "--db", "test", "-e", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # --------------------------------------------------------------------------
  # APLICACIÓN — Open Notebook
  # --------------------------------------------------------------------------
  # Frontend (8502) y API (5055) solo en 127.0.0.1.
  # --------------------------------------------------------------------------
  open_notebook:
    image: lfnovo/open_notebook:v1-latest
    container_name: on-app

    ports:
      - "127.0.0.1:${APP_PORT:-8502}:8502"    # Web UI — solo localhost
      - "127.0.0.1:${API_PORT:-5055}:5055"     # REST API — solo localhost

    env_file:
      - .env

    environment:
      # Conexión a BD via red interna Docker (NO via host)
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_NAMESPACE=${SURREAL_NAMESPACE}
      - SURREAL_DATABASE=${SURREAL_DATABASE}

      # Desactivar llamadas salientes automáticas
      - OPEN_NOTEBOOK_ENABLE_UPDATE_CHECK=false

    volumes:
      - notebook_data:/app/data

    depends_on:
      surrealdb:
        condition: service_healthy

    restart: unless-stopped
    pull_policy: never

    networks:
      - on_internal

    # Seguridad del contenedor
    security_opt:
      - no-new-privileges:true

    # Límites de recursos
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M

# ============================================================================
# RED INTERNA
# ============================================================================
# Red bridge aislada. Los contenedores se comunican entre sí por nombre
# de servicio (surrealdb:8000) sin necesidad de exponer puertos al host.
# ============================================================================
networks:
  on_internal:
    driver: bridge
    internal: false
    # Nota: "internal: true" bloquearía TODO el tráfico saliente del stack,
    # lo que impediría a Open Notebook conectarse a Ollama en el host
    # (host.docker.internal) y descargar contenido web para procesar.
    # Si se usa Ollama dentro del mismo compose, se puede poner true.

# ============================================================================
# VOLÚMENES NOMBRADOS
# ============================================================================
# Más seguros que bind mounts en Windows:
#   - Docker gestiona permisos internamente
#   - No exponen rutas del sistema de ficheros del host
#   - Evitan el bug de Docker Desktop con bind mounts en unidades externas
# ============================================================================
volumes:
  surreal_data:
    name: on-surreal-data
  notebook_data:
    name: on-notebook-data
